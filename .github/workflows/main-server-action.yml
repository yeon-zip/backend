name: dedicated-backend-action
on:
  push:
    branches: [ "main" ]  
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Tailscale Login
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar

      - name: Transfer jar to Rocky Linux Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ROCKY_SERVER_IP }}
          username: ${{ secrets.WAS_USER }}
          password: ${{ secrets.WAS_PASSWORD }}
          source: "build/libs/polaris-0.0.1-SNAPSHOT.jar"
          target: "~/was-docker"
          strip_components: 2

      - name: Restart WAS Docker Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ROCKY_SERVER_IP }}
          username: ${{ secrets.WAS_USER }}
          password: ${{ secrets.WAS_PASSWORD }}
          script: |
            echo "Jar transfer completed. Restarting docker container..."
            sudo docker restart polaris-was
            sleep 3
            sudo docker logs --tail 10 polaris-was
