server:
  port: 8080
  tomcat:
    max-part-count: 500
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 2KB

spring:
  application:
    name: polaris
  profiles:
    group:
      prod: prod
      dev: dev
      local: local
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  web:
    error:
      whitelabel:
        enabled: false
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false
  data:
    web:
      pageable:
        one-indexed-parameters: true
  jackson:
    time-zone: Asia/Seoul
  security:
    oauth2:
      client:
        registration:
          kakao:
            provider: kakao
            client-id: ${KAKAO_OIDC_CLIENT_ID:test-kakao-client-id}
            client-secret: ${KAKAO_OIDC_CLIENT_SECRET:test-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_OIDC_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - profile_nickname
              - account_email
            client-name: Kakao
        provider:
          kakao:
            issuer-uri: ${KAKAO_OIDC_ISSUER_URI:https://kauth.kakao.com}

management:
  server:
    port: 9090

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never
      show-components: never

core:
  auth:
    jwt:
      issuer: ${JWT_ISSUER:https://api.k-polaris.life}
      secret: ${JWT_SECRET:polaris-auth-jwt-secret-key-polstar-2026-32bytes}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

---

spring:
  profiles:
    active: local
