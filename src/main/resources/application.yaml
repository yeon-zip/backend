server:
  port: 8080
  tomcat:
    max-part-count: 500
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 2KB

spring:
  application:
    name: polaris
  profiles:
    group:
      prod: prod
      dev: dev
      local: local
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  web:
    error:
      whitelabel:
        enabled: false
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false
  data:
    web:
      pageable:
        one-indexed-parameters: true
  jackson:
    time-zone: Asia/Seoul
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_OIDC_CLIENT_ID:kakao-client-id}
            client-secret: ${KAKAO_OIDC_CLIENT_SECRET:kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_OIDC_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - profile_nickname
              - profile_image
            client-name: Kakao
        provider:
          kakao:
            issuer-uri: ${KAKAO_OIDC_ISSUER_URI:https://kauth.kakao.com}

management:
  server:
    port: 9090
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      show-components: never

core:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "https://localhost:3000"
    allowed-methods: [ "GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS" ]
    allowed-headers: [ "*" ]
    exposed-headers: [ ]
    allow-credentials: true
    max-age: 3600
  openapi:
    data4library:
      base-url: "http://data4library.kr"
      auth-key: ${DATA4LIBRARY_AUTH_KEY:data4library-auth-key}
    naver:
      search:
        list:
          base-url: "https://openapi.naver.com/v1/search/book.json"
          client-id: ${NAVER_BOOK_SEARCH_LIST_CLIENT_ID:naver-client-id}
          client-secret: ${NAVER_BOOK_SEARCH_LIST_CLIENT_SECRET:naver-client-secret}
        detail:
          base-url: "https://openapi.naver.com/v1/search/book_adv.json"
          client-id: ${NAVER_BOOK_SEARCH_DETAIL_CLIENT_ID:naver-client-id}
          client-secret: ${NAVER_BOOK_SEARCH_DETAIL_CLIENT_SECRET:naver-client-secret}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:http://localhost:8080}
      secret: ${JWT_SECRET:polaris-auth-jwt-secret-key-polstar-2026-32bytes}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    oidc:
      app:
        targets:
          mobile: ${OIDC_APP_TARGET_MOBILE:polaris://auth/callback}
        exchange:
          ttl: ${OIDC_APP_EXCHANGE_TTL:3m}
          allow-without-proof: ${OIDC_APP_EXCHANGE_ALLOW_WITHOUT_PROOF:false}
      legacy-json-callback:
        enabled: ${OIDC_LEGACY_JSON_CALLBACK_ENABLED:false}

---

spring:
  profiles:
    active: local
