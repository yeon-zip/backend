spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:22936/local
    username: ${DATASOURCE_ID}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: true
        hbm2ddl.auto: update
    show-sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    kr.ac.kumoh.polestar: debug

core:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "https://localhost:3000"
    allowed-methods: [ "GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS" ]
    allowed-headers: [ "*" ]
    exposed-headers: [ ]
    allow-credentials: true
    max-age: 3600
  openapi:
    data4library:
      base-url: "http://data4library.kr"
      auth-key: ${DATA4LIBRARY_AUTH_KEY}
    naver:
      search:
        base-url: "https://openapi.naver.com"
        client-id: ${NAVER_BOOK_SEARCH_CLIENT_ID}
        client-secret: ${NAVER_BOOK_SEARCH_CLIENT_SECRET}
    national-library:
      base-url: "https://www.nl.go.kr"
      api-key: ${NATIONAL_LIBRARY_API_KEY}
